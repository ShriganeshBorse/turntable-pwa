<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="32" fill="#111111"/>
  <!-- Camera body -->
  <rect x="30" y="64" width="132" height="90" rx="10" fill="#333333" stroke="#00bcd4" stroke-width="4"/>
  <!-- Lens ring -->
  <circle cx="96" cy="110" r="32" fill="none" stroke="#00bcd4" stroke-width="5"/>
  <circle cx="96" cy="110" r="20" fill="none" stroke="#00bcd4" stroke-width="3"/>
  <!-- Lens center -->
  <circle cx="96" cy="110" r="10" fill="#00bcd4" opacity="0.7"/>
  <!-- Shutter bump -->
  <rect x="60" y="48" width="36" height="20" rx="8" fill="#333333" stroke="#00bcd4" stroke-width="3"/>
  <!-- Rotation arc (turntable indicator) -->
  <path d="M 48 155 A 52 20 0 0 1 144 155" fill="none" stroke="#00bcd4" stroke-width="3" stroke-dasharray="6 4"/>
  <polygon points="144,148 144,162 155,155" fill="#00bcd4"/>
</svg>
